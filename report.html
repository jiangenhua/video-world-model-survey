<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调研报告全文 | 视频世界模型开源数据集</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #181b23;
  --border: #2a2e3b;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --text: #cdd6e4;
  --text-bright: #f0f4f8;
  --text-dim: #6b7a8d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.85; -webkit-font-smoothing: antialiased;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ---- Top bar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,17,23,0.88); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; height: 56px; padding: 0 32px;
}
.topbar a {
  color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 6px; transition: opacity .2s;
}
.topbar a:hover { opacity: .75; }
.topbar .title {
  margin-left: 20px; font-size: 15px; color: var(--text-bright); font-weight: 500;
}
.topbar .meta { margin-left: auto; font-size: 12px; color: var(--text-dim); }

/* ---- TOC Sidebar ---- */
.layout { display: flex; max-width: 1400px; margin: 0 auto; }
.toc {
  position: sticky; top: 56px; align-self: flex-start;
  width: 260px; min-width: 260px; height: calc(100vh - 56px);
  overflow-y: auto; padding: 28px 16px; border-right: 1px solid var(--border);
  background: rgba(24,27,35,.4);
}
.toc-title { font-size: 11px; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
.toc a {
  display: block; padding: 6px 12px; margin-bottom: 2px;
  font-size: 13px; color: var(--text-dim); text-decoration: none;
  border-radius: 6px; transition: all .15s; border-left: 2px solid transparent;
}
.toc a:hover { color: var(--text); background: var(--surface); }
.toc a.active { color: var(--accent); background: rgba(108,92,231,.1); border-left-color: var(--accent); font-weight: 600; }
.toc a.indent { padding-left: 28px; font-size: 12.5px; }

/* ---- Article ---- */
.article {
  flex: 1; min-width: 0; max-width: 860px;
  padding: 48px 56px 100px; margin: 0 auto;
}

/* ---- Markdown rendered styles ---- */
.article h1 {
  font-size: 32px; font-weight: 800; color: var(--text-bright);
  margin-bottom: 8px; letter-spacing: -.3px;
}
.article h2 {
  font-size: 24px; font-weight: 700; color: var(--text-bright);
  margin: 52px 0 16px; padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
}
.article h3 {
  font-size: 19px; font-weight: 600; color: var(--text-bright);
  margin: 36px 0 12px;
}
.article h4 {
  font-size: 16px; font-weight: 600; color: var(--accent2);
  margin: 28px 0 8px;
}
.article p { margin-bottom: 14px; font-size: 15px; }
.article blockquote {
  border-left: 3px solid var(--accent);
  background: rgba(108,92,231,.06);
  padding: 12px 20px; margin: 16px 0; border-radius: 0 8px 8px 0;
  color: var(--text-dim); font-size: 14px;
}
.article ul, .article ol { padding-left: 22px; margin-bottom: 14px; }
.article li { margin-bottom: 6px; font-size: 15px; }
.article strong { color: var(--text-bright); }
.article hr {
  border: none; height: 1px; background: var(--border);
  margin: 40px 0;
}
.article em { color: var(--accent2); font-style: normal; }
.article a { color: var(--accent); text-decoration: none; }
.article a:hover { text-decoration: underline; }

/* ---- Tables ---- */
.article table {
  width: 100%; border-collapse: collapse; margin: 16px 0;
  font-size: 13px; display: block; overflow-x: auto;
}
.article thead th {
  background: var(--surface); color: var(--text-bright);
  padding: 10px 12px; text-align: left; font-weight: 600;
  border-bottom: 2px solid var(--accent); white-space: nowrap;
  position: sticky; top: 0;
}
.article tbody td {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  color: var(--text); vertical-align: top;
}
.article tbody tr:hover td { background: rgba(108,92,231,.04); }

/* ---- Code ---- */
.article code {
  background: var(--surface); color: var(--accent2);
  padding: 2px 6px; border-radius: 4px; font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.article pre {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 20px; overflow-x: auto;
  margin: 16px 0;
}
.article pre code { background: none; padding: 0; }

/* ---- Reading progress ---- */
.progress-bar {
  position: fixed; top: 56px; left: 0; right: 0; height: 2px; z-index: 99;
  background: transparent;
}
.progress-bar .fill {
  height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .1s;
}

/* ---- Responsive ---- */
@media (max-width: 1000px) {
  .toc { display: none; }
  .article { padding: 32px 20px 60px; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M7.293 1.5a1 1 0 0 1 1.414 0l6.647 6.646a.5.5 0 0 1-.708.708L8 2.207 1.354 8.854a.5.5 0 1 1-.708-.708L7.293 1.5z"/><path d="M14 7.5V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.5"/></svg>
    返回数据看板
  </a>
  <span class="title">调研报告全文</span>
  <span class="meta">Markdown 渲染</span>
</div>

<div class="progress-bar"><div class="fill" id="progress"></div></div>

<div class="layout">
  <nav class="toc" id="toc"></nav>
  <article class="article" id="article">
    <div style="text-align:center;padding:80px 0;color:var(--text-dim)">正在加载报告...</div>
  </article>
</div>

<script>
async function init() {
  const resp = await fetch('report.md');
  const md = await resp.text();

  marked.setOptions({
    gfm: true,
    breaks: false,
    headerIds: true
  });
  const html = marked.parse(md);
  document.getElementById('article').innerHTML = html;

  buildTOC();
  setupScrollSpy();
  setupProgress();
}

function buildTOC() {
  const toc = document.getElementById('toc');
  const headings = document.querySelectorAll('.article h2, .article h3');
  let tocHTML = '<div class="toc-title">目录</div>';

  headings.forEach((h, i) => {
    const id = 'heading-' + i;
    h.id = id;
    const isH3 = h.tagName === 'H3';
    const text = h.textContent.replace(/^#+\s*/, '');
    tocHTML += `<a href="#${id}" class="${isH3 ? 'indent' : ''}">${text}</a>`;
  });

  toc.innerHTML = tocHTML;
}

function setupScrollSpy() {
  const links = document.querySelectorAll('.toc a');
  const headings = document.querySelectorAll('.article h2[id], .article h3[id]');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.toc a[href="#${entry.target.id}"]`);
        if (active) {
          active.classList.add('active');
          active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
    });
  }, { rootMargin: '-60px 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));

  document.querySelectorAll('.toc a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const target = document.querySelector(a.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function setupProgress() {
  const bar = document.getElementById('progress');
  window.addEventListener('scroll', () => {
    const h = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
  });
}

init();
</script>
</body>
</html>
